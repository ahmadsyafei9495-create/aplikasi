<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - SMA NEGERI 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800">
    <div class="container mx-auto px-4 py-8">
      <h1 class="text-2xl font-semibold mb-6">Admin Portal</h1>

      <div id="login-panel" class="max-w-md bg-white p-6 rounded shadow">
        <h2 class="text-lg font-medium mb-4">Masuk</h2>
        <label class="block mb-2">Username<input id="username" class="w-full border p-2 rounded" /></label>
        <label class="block mb-4">Password<input id="password" type="password" class="w-full border p-2 rounded" /></label>
        <button id="btn-login" class="bg-blue-600 text-white px-4 py-2 rounded">Masuk</button>
        <p id="login-msg" class="text-sm text-red-600 mt-2"></p>
      </div>

      <div id="admin-area" class="hidden mt-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Kelola Pengumuman</h2>
          <button id="btn-logout" class="text-sm text-red-600">Keluar</button>
        </div>

        <div class="bg-white p-4 rounded shadow mb-6">
          <label class="block mb-2">Judul<input id="ann-title" class="w-full border p-2 rounded" /></label>
          <label class="block mb-4">Isi<textarea id="ann-content" class="w-full border p-2 rounded"></textarea></label>
          <button id="btn-create-ann" class="bg-green-600 text-white px-4 py-2 rounded">Tambah Pengumuman</button>
          <p id="ann-msg" class="text-sm text-green-600 mt-2"></p>
        </div>

        <div id="admin-data" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
